version: "3.9"

services:

  # ── Vector Database ───────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build: ./api
    container_name: ai-api
    restart: always
    ports:
      - "8800:8800"
    env_file: .env
    volumes:
      - ./api:/app
      - pdf_uploads:/app/uploads
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8800/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── WhatsApp Bot ──────────────────────────────────────────────────────────
  whatsapp-bot:
    build: ./whatsapp-bot
    container_name: whatsapp-bot
    restart: always
    env_file: .env
    volumes:
      - whatsapp_auth:/app/.wwebjs_auth
    depends_on:
      api:
        condition: service_healthy
    stdin_open: true
    tty: true

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  qdrant_data:
  pdf_uploads:
  whatsapp_auth:
